    <path d="M26 18c10 0 18 8 18 18 0 16-18 26-18 26S8 52 8 36c0-10 8-18 18-18z" fill="none" stroke="#9d174d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Maternity</text>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#475569">Antenatal � delivery � postnatal support</text>
  </g>
  <g transform="translate(240,250)">
    <!-- mother (Black African) -->
    <g transform="translate(90,30)">
      <circle cx="170" cy="78" r="48" fill="#6b3f2a"/>
      <path d="M126 78c4-34 30-56 58-54 26 2 48 22 50 52-18-12-34-18-58-18-24 0-38 6-50 20z" fill="#0f172a"/>
      <path d="M92 350c0-90 34-150 88-150s88 60 88 150v30H92v-30z" fill="#fff1f2" stroke="#fecdd3" stroke-width="2"/>
      <path d="M120 270c14-30 34-46 60-46s46 16 60 46v110H120V270z" fill="#fb7185" opacity="0.18"/>
      <!-- belly -->
      <ellipse cx="182" cy="312" rx="58" ry="44" fill="#fb7185" opacity="0.20"/>
      <path d="M144 312c18 14 54 14 76 0" fill="none" stroke="#9d174d" stroke-width="6" stroke-linecap="round" opacity="0.25"/>
    </g>

    <!-- midwife/nurse (Black African) -->
    <g transform="translate(560,40)">
      <rect x="0" y="300" width="320" height="22" rx="11" fill="#0f172a" opacity="0.10"/>
      <circle cx="140" cy="78" r="48" fill="#6b3f2a"/>
      <path d="M96 78c4-34 30-56 58-54 26 2 48 22 50 52-18-12-34-18-58-18-24 0-38 6-50 20z" fill="#111827"/>
      <path d="M64 340c0-90 32-150 76-150s76 60 76 150v40H64v-40z" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <path d="M90 270c12-26 30-40 50-40s38 14 50 40v110H90V270z" fill="#9d174d" opacity="0.14"/>
      <!-- heart -->
      <path d="M250 270c16 0 28 12 28 28 0 22-28 38-28 38s-28-16-28-38c0-16 12-28 28-28z" fill="#fb7185" opacity="0.30"/>
    </g>
