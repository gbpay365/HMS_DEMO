<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Maternity">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#170a14"/>
      <stop offset="1" stop-color="#9d174d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="120" y="110" width="960" height="480" rx="28" fill="#ffffff" opacity="0.94"/>
  </g>
  <g transform="translate(170,165)">
