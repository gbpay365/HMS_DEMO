<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Medical doctors">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071023"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="110" width="960" height="480" rx="28" fill="#ffffff" opacity="0.94"/>
  </g>

  <g transform="translate(170,165)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#1d4ed8" opacity="0.14"/>
    <path d="M26 14c6.8 0 12 5.2 12 12s-5.2 12-12 12-12-5.2-12-12 5.2-12 12-12zm-9 28c1.6-5.4 7-9 9-9s7.4 3.6 9 9" fill="none" stroke="#1d4ed8" stroke-width="4" stroke-linecap="round"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Medical doctors</text>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#475569">Specialists &amp; general practice</text>
  </g>

  <!-- 3 Black African doctors -->
  <g transform="translate(250,260)">
    <!-- left doctor -->
    <g transform="translate(0,20)">
      <circle cx="120" cy="70" r="44" fill="#6b3f2a"/>
      <path d="M82 70c4-30 26-48 52-46 24 2 42 20 44 44-14-10-28-14-50-14-22 0-32 4-46 16z" fill="#111827"/>
      <path d="M60 300c0-66 24-110 60-110s60 44 60 110v40H60v-40z" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <path d="M120 186l-22 30c8 6 14 16 16 30l10 94h-38l16-124c4-14 10-24 18-30z" fill="#f8fafc"/>
      <path d="M120 186l22 30c-8 6-14 16-16 30l-10 94h38l-16-124c-4-14-10-24-18-30z" fill="#f8fafc"/>
      <path d="M98 214c0 18 12 28 22 28s22-10 22-28" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
      <path d="M120 242v18c0 16 12 26 26 26" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
      <circle cx="152" cy="286" r="10" fill="#1d4ed8" opacity="0.18" stroke="#1d4ed8" stroke-width="4"/>
    </g>

    <!-- center doctor -->
    <g transform="translate(290,0)">
      <circle cx="160" cy="78" r="50" fill="#6b3f2a"/>
      <path d="M116 78c4-34 30-56 58-54 26 2 48 22 50 52-18-12-34-18-58-18-24 0-38 6-50 20z" fill="#0f172a"/>
      <path d="M88 330c0-78 30-130 72-130s72 52 72 130v40H88v-40z" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="136" y="214" width="48" height="72" rx="14" fill="#dbeafe"/>
      <path d="M160 226v48M144 250h32" stroke="#1d4ed8" stroke-width="8" stroke-linecap="round"/>
      <path d="M132 236c0 20 14 32 28 32s28-12 28-32" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
    </g>

    <!-- right doctor -->
    <g transform="translate(640,22)">
      <circle cx="120" cy="70" r="44" fill="#6b3f2a"/>
      <path d="M82 70c4-30 26-48 52-46 24 2 42 20 44 44-14-10-28-14-50-14-22 0-32 4-46 16z" fill="#111827"/>
      <path d="M60 300c0-66 24-110 60-110s60 44 60 110v40H60v-40z" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <path d="M98 214c0 18 12 28 22 28s22-10 22-28" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
      <path d="M120 242v18c0 16 12 26 26 26" fill="none" stroke="#1d4ed8" stroke-width="5" stroke-linecap="round"/>
      <circle cx="152" cy="286" r="10" fill="#1d4ed8" opacity="0.18" stroke="#1d4ed8" stroke-width="4"/>
    </g>
  </g>

  <text x="600" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cbd5e1" opacity="0.95">
    Compassionate care � Cameroon
  </text>
</svg>
