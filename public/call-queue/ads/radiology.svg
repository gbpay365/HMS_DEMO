<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Medical imaging">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="110" width="960" height="480" rx="28" fill="#ffffff" opacity="0.94"/>
  </g>

  <g transform="translate(170,165)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#0e7490" opacity="0.14"/>
    <path d="M16 38h24M20 18h16l6 10H14l6-10z" fill="none" stroke="#0e7490" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Medical imaging</text>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#475569">X-ray � ultrasound � ECG</text>
  </g>

  <g transform="translate(220,235)">
    <!-- monitor with x-ray -->
    <g transform="translate(520,30)">
      <rect x="0" y="0" width="440" height="320" rx="24" fill="#0b1220" opacity="0.92"/>
      <rect x="18" y="18" width="404" height="260" rx="18" fill="#0b1328"/>
      <rect x="120" y="292" width="200" height="18" rx="9" fill="#0b1220" opacity="0.55"/>
      <rect x="196" y="310" width="48" height="40" rx="12" fill="#0b1220" opacity="0.55"/>
      <!-- x-ray skeleton -->
      <circle cx="220" cy="90" r="34" fill="#38bdf8" opacity="0.18"/>
      <path d="M220 122v86" stroke="#7dd3fc" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
      <path d="M170 150c24-18 36-18 50-6 14-12 26-12 50 6" fill="none" stroke="#7dd3fc" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
      <path d="M190 210c12 26 28 40 30 40s18-14 30-40" fill="none" stroke="#7dd3fc" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
      <path d="M210 250v34M230 250v34" stroke="#7dd3fc" stroke-width="10" stroke-linecap="round" opacity="0.7"/>
    </g>

    <!-- radiology tech (Black African) -->
    <g transform="translate(40,60)">
      <circle cx="180" cy="78" r="48" fill="#6b3f2a"/>
      <path d="M136 78c4-34 30-56 58-54 26 2 48 22 50 52-18-12-34-18-58-18-24 0-38 6-50 20z" fill="#0f172a"/>
      <path d="M92 340c0-84 34-140 88-140s88 56 88 140v40H92v-40z" fill="#e0f2fe"/>
      <path d="M122 260c14-28 34-44 58-44s44 16 58 44v120H122V260z" fill="#0ea5e9" opacity="0.18"/>
      <path d="M150 224c0 20 14 32 30 32s30-12 30-32" fill="none" stroke="#0e7490" stroke-width="5" stroke-linecap="round"/>
      <!-- tablet -->
      <rect x="250" y="250" width="120" height="88" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="266" y="268" width="88" height="10" rx="5" fill="#e2e8f0"/>
      <rect x="266" y="288" width="72" height="10" rx="5" fill="#e2e8f0"/>
      <rect x="266" y="308" width="80" height="10" rx="5" fill="#e2e8f0"/>
    </g>
  </g>

  <text x="600" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cbd5e1" opacity="0.95">
    Clear imaging � Safe procedures � Trusted reports
  </text>
</svg>
