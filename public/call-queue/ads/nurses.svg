<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Nurses">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06161a"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="110" width="960" height="480" rx="28" fill="#ffffff" opacity="0.94"/>
  </g>

  <g transform="translate(170,165)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#059669" opacity="0.14"/>
    <path d="M16 34h20M26 24v20" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Nurses</text>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#475569">Triage � bedside care � patient support</text>
  </g>

  <!-- 2 Black African nurses -->
  <g transform="translate(270,255)">
    <!-- Nurse 1 -->
    <g transform="translate(0,30)">
      <circle cx="170" cy="70" r="46" fill="#6b3f2a"/>
      <path d="M126 70c4-32 28-52 54-50 24 2 42 20 44 44-14-10-28-14-50-14-22 0-32 4-48 20z" fill="#0f172a"/>
      <!-- cap -->
      <path d="M126 58c16-18 34-26 54-26s38 8 54 26l-18 10c-12-10-24-14-36-14s-24 4-36 14l-18-10z" fill="#ffffff" opacity="0.95"/>
      <rect x="166" y="42" width="8" height="34" rx="4" fill="#059669"/>
      <rect x="153" y="55" width="34" height="8" rx="4" fill="#059669"/>

      <path d="M92 330c0-78 32-130 78-130s78 52 78 130v40H92v-40z" fill="#dcfce7"/>
      <path d="M118 250c12-22 30-34 52-34s40 12 52 34v120H118V250z" fill="#10b981" opacity="0.22"/>
      <path d="M140 224c0 20 14 32 30 32s30-12 30-32" fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
      <rect x="150" y="274" width="40" height="62" rx="12" fill="#ffffff" opacity="0.9"/>
      <path d="M170 284v42M156 305h28" stroke="#059669" stroke-width="7" stroke-linecap="round"/>
    </g>

    <!-- Nurse 2 -->
    <g transform="translate(450,0)">
      <circle cx="170" cy="70" r="46" fill="#6b3f2a"/>
      <path d="M126 70c4-32 28-52 54-50 24 2 42 20 44 44-14-10-28-14-50-14-22 0-32 4-48 20z" fill="#111827"/>
      <!-- cap -->
      <path d="M126 58c16-18 34-26 54-26s38 8 54 26l-18 10c-12-10-24-14-36-14s-24 4-36 14l-18-10z" fill="#ffffff" opacity="0.95"/>
      <rect x="166" y="42" width="8" height="34" rx="4" fill="#059669"/>
      <rect x="153" y="55" width="34" height="8" rx="4" fill="#059669"/>

      <path d="M92 330c0-78 32-130 78-130s78 52 78 130v40H92v-40z" fill="#dcfce7"/>
      <path d="M118 250c12-22 30-34 52-34s40 12 52 34v120H118V250z" fill="#10b981" opacity="0.22"/>
      <path d="M140 224c0 20 14 32 30 32s30-12 30-32" fill="none" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
      <!-- clipboard -->
      <rect x="206" y="250" width="88" height="120" rx="14" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="226" y="268" width="48" height="10" rx="5" fill="#e2e8f0"/>
      <rect x="226" y="288" width="60" height="10" rx="5" fill="#e2e8f0"/>
      <rect x="226" y="308" width="54" height="10" rx="5" fill="#e2e8f0"/>
    </g>
  </g>

  <text x="600" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cbd5e1" opacity="0.95">
    Patient support � Safety � Dignity
  </text>
</svg>
