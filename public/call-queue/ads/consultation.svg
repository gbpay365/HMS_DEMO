<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Consultation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0b3b5b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="700" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="140" fill="#22c55e" opacity="0.12"/>
  <circle cx="1050" cy="170" r="90" fill="#38bdf8" opacity="0.12"/>

  <g filter="url(#shadow)">
    <rect x="110" y="110" width="980" height="480" rx="28" fill="url(#card)"/>
  </g>

  <!-- Header -->
  <g transform="translate(160,160)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#2563eb" opacity="0.14"/>
    <path d="M26 14c6.8 0 12 5.2 12 12s-5.2 12-12 12-12-5.2-12-12 5.2-12 12-12zm-9 28c1.6-5.4 7-9 9-9s7.4 3.6 9 9" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Consultation</text>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#475569">Doctorpatient visit � examination � care plan</text>
  </g>

  <!-- Scene: doctor + patient (Black African) -->
  <g transform="translate(220,250)">
    <!-- Desk -->
    <rect x="190" y="230" width="520" height="26" rx="13" fill="#0f172a" opacity="0.12"/>
    <rect x="190" y="80" width="520" height="160" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="220" y="110" width="170" height="18" rx="9" fill="#e2e8f0"/>
    <rect x="220" y="140" width="260" height="14" rx="7" fill="#e2e8f0"/>
    <rect x="220" y="165" width="220" height="14" rx="7" fill="#e2e8f0"/>
    <rect x="560" y="120" width="120" height="90" rx="14" fill="#dbeafe"/>
    <path d="M620 140v50M595 165h50" stroke="#2563eb" stroke-width="10" stroke-linecap="round"/>

    <!-- Doctor -->
    <g transform="translate(30,40)">
      <!-- coat -->
      <path d="M150 210c0-54 22-84 66-84s66 30 66 84v102H150V210z" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <path d="M216 130c-18 8-28 24-32 44l-18 120h38l12-104c2-14 10-24 26-28l-26-32z" fill="#f8fafc"/>
      <path d="M216 130c18 8 28 24 32 44l18 120h-38l-12-104c-2-14-10-24-26-28l26-32z" fill="#f8fafc"/>
      <!-- head -->
      <circle cx="216" cy="88" r="42" fill="#6b3f2a"/>
      <!-- hair -->
      <path d="M178 86c6-30 30-46 56-42 24 4 40 22 42 44-18-10-32-14-56-14-22 0-32 4-42 12z" fill="#1f2937"/>
      <!-- face details -->
      <circle cx="202" cy="92" r="4" fill="#0f172a" opacity="0.35"/>
      <circle cx="230" cy="92" r="4" fill="#0f172a" opacity="0.35"/>
      <path d="M206 110c10 8 20 8 30 0" stroke="#0f172a" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
      <!-- stethoscope -->
      <path d="M192 148c0 18 12 28 24 28s24-10 24-28" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
      <path d="M216 176v20c0 16 12 26 26 26" fill="none" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
      <circle cx="250" cy="222" r="10" fill="#2563eb" opacity="0.18" stroke="#2563eb" stroke-width="4"/>
    </g>

    <!-- Patient -->
    <g transform="translate(740,70)">
      <!-- chair -->
      <rect x="-40" y="250" width="180" height="28" rx="14" fill="#0f172a" opacity="0.10"/>
      <rect x="-10" y="120" width="120" height="150" rx="24" fill="#f1f5f9"/>
      <!-- body -->
      <path d="M50 190c-44 0-72 26-72 70v70h144v-70c0-44-28-70-72-70z" fill="#0ea5e9" opacity="0.18"/>
      <path d="M-8 260c12-30 34-46 58-46s46 16 58 46v70H-8v-70z" fill="#0ea5e9" opacity="0.22"/>
      <!-- head -->
      <circle cx="50" cy="96" r="40" fill="#6b3f2a"/>
      <!-- hair -->
      <path d="M14 98c2-28 20-46 40-46s38 16 40 44c-12-10-26-14-40-14s-28 4-40 16z" fill="#111827"/>
      <circle cx="36" cy="100" r="4" fill="#0f172a" opacity="0.35"/>
      <circle cx="64" cy="100" r="4" fill="#0f172a" opacity="0.35"/>
      <path d="M38 118c10 8 18 8 28 0" stroke="#0f172a" stroke-width="4" stroke-linecap="round" opacity="0.25"/>
    </g>
  </g>

  <!-- Footer text -->
  <text x="600" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cbd5e1" opacity="0.95">
    Quality care � Respect � Confidentiality
  </text>
</svg>
