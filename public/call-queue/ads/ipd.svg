<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="IPD Inpatient">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090f23"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="120" y="110" width="960" height="480" rx="28" fill="#ffffff" opacity="0.94"/>
  </g>
  <g transform="translate(170,165)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#6366f1" opacity="0.14"/>
    <path d="M16 34h28M20 34V22c0-4 3-6 6-6h8c3 0 6 2 6 6v12" fill="none" stroke="#6366f1" stroke-width="4" stroke-linecap="round"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">IPD  Inpatient</text>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#475569">Ward care � monitoring � treatment</text>
  </g>
  <g transform="translate(220,250)">
    <!-- bed -->
    <rect x="60" y="260" width="520" height="28" rx="14" fill="#0f172a" opacity="0.10"/>
    <rect x="80" y="170" width="480" height="110" rx="22" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
    <rect x="80" y="130" width="180" height="70" rx="22" fill="#e0e7ff"/>
    <rect x="110" y="152" width="120" height="20" rx="10" fill="#c7d2fe"/>
    <!-- patient silhouette (Black African) -->
    <circle cx="180" cy="150" r="34" fill="#6b3f2a"/>
    <path d="M220 180c-22-18-58-18-80 0" fill="none" stroke="#475569" stroke-width="8" stroke-linecap="round" opacity="0.35"/>
    <path d="M120 206h360" stroke="#94a3b8" stroke-width="10" stroke-linecap="round" opacity="0.35"/>

    <!-- nurse (Black African) -->
    <g transform="translate(700,10)">
      <rect x="-20" y="290" width="260" height="22" rx="11" fill="#0f172a" opacity="0.10"/>
      <circle cx="100" cy="78" r="46" fill="#6b3f2a"/>
      <path d="M56 78c4-32 28-52 54-50 24 2 42 20 44 44-14-10-28-14-50-14-22 0-32 4-48 20z" fill="#0f172a"/>
      <path d="M24 320c0-84 30-140 76-140s76 56 76 140v40H24v-40z" fill="#eef2ff"/>
      <path d="M54 250c12-24 28-36 46-36s34 12 46 36v110H54V250z" fill="#6366f1" opacity="0.16"/>
      <!-- stethoscope -->
      <path d="M76 224c0 18 12 28 24 28s24-10 24-28" fill="none" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
      <path d="M100 252v16c0 16 12 26 26 26" fill="none" stroke="#6366f1" stroke-width="5" stroke-linecap="round"/>
      <circle cx="132" cy="296" r="10" fill="#6366f1" opacity="0.18" stroke="#6366f1" stroke-width="4"/>
    </g>
  </g>
  <text x="600" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cbd5e1" opacity="0.95">
    Comfortable wards � Continuous monitoring � Safe treatment
  </text>
</svg>
