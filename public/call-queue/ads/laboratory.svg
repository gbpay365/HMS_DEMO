<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Laboratory">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="120" y="110" width="960" height="480" rx="28" fill="#ffffff" opacity="0.94"/>
  </g>

  <g transform="translate(170,165)">
    <rect x="0" y="0" width="52" height="52" rx="14" fill="#7c3aed" opacity="0.14"/>
    <path d="M18 14h16l-2 8v18c0 6-6 10-6 10s-6-4-6-10V22l-2-8z" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linejoin="round"/>
    <path d="M18 32h16" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
    <text x="70" y="22" font-family="Arial, sans-serif" font-size="30" font-weight="800" fill="#0f172a">Laboratory</text>
    <text x="70" y="50" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#475569">Haematology � biochemistry � rapid tests</text>
  </g>

  <!-- Black African lab scientist + equipment -->
  <g transform="translate(240,240)">
    <!-- equipment panel -->
    <g transform="translate(520,40)">
      <rect x="0" y="0" width="360" height="300" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <rect x="26" y="24" width="308" height="44" rx="14" fill="#ede9fe"/>
      <rect x="26" y="90" width="120" height="88" rx="18" fill="#f1f5f9"/>
      <rect x="164" y="90" width="170" height="18" rx="9" fill="#e2e8f0"/>
      <rect x="164" y="120" width="140" height="14" rx="7" fill="#e2e8f0"/>
      <rect x="164" y="145" width="155" height="14" rx="7" fill="#e2e8f0"/>
      <rect x="26" y="200" width="308" height="78" rx="18" fill="#f8fafc"/>
      <circle cx="70" cy="238" r="18" fill="#7c3aed" opacity="0.18"/>
      <circle cx="124" cy="238" r="18" fill="#7c3aed" opacity="0.18"/>
      <circle cx="178" cy="238" r="18" fill="#7c3aed" opacity="0.18"/>
      <rect x="234" y="226" width="90" height="24" rx="12" fill="#ddd6fe"/>
    </g>

    <!-- scientist -->
    <g transform="translate(40,60)">
      <circle cx="170" cy="78" r="48" fill="#6b3f2a"/>
      <path d="M126 78c4-34 30-56 58-54 26 2 48 22 50 52-18-12-34-18-58-18-24 0-38 6-50 20z" fill="#0f172a"/>
      <path d="M90 340c0-84 30-140 80-140s80 56 80 140v40H90v-40z" fill="#ffffff" stroke="#e2e8f0" stroke-width="2"/>
      <path d="M170 210l-24 34c10 8 16 20 18 36l10 100h-40l18-134c4-16 10-28 18-36z" fill="#f8fafc"/>
      <path d="M170 210l24 34c-10 8-16 20-18 36l-10 100h40l-18-134c-4-16-10-28-18-36z" fill="#f8fafc"/>
      <!-- gloves -->
      <circle cx="122" cy="330" r="16" fill="#e0e7ff"/>
      <circle cx="218" cy="330" r="16" fill="#e0e7ff"/>
      <!-- vial -->
      <g transform="translate(238,292)">
        <rect x="0" y="0" width="38" height="70" rx="14" fill="#ede9fe" stroke="#c4b5fd" stroke-width="2"/>
        <rect x="10" y="-10" width="18" height="16" rx="6" fill="#7c3aed" opacity="0.65"/>
        <rect x="8" y="24" width="22" height="28" rx="10" fill="#7c3aed" opacity="0.20"/>
      </g>
      <!-- badge -->
      <rect x="144" y="258" width="52" height="70" rx="14" fill="#ede9fe"/>
      <rect x="154" y="270" width="32" height="10" rx="5" fill="#c4b5fd"/>
      <rect x="154" y="288" width="32" height="10" rx="5" fill="#c4b5fd"/>
    </g>
  </g>

  <text x="600" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#cbd5e1" opacity="0.95">
    Accurate results � Fast turnaround � Quality control
  </text>
</svg>
