<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HMS Lab – Test Templates</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── RESET & ROOT ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0d0f14;
  --surface:   #161921;
  --card:      #1e2230;
  --border:    #2a2f42;
  --border-2:  #343a52;
  --text:      #e8ecf5;
  --muted:     #8891b0;
  --accent:    #4fc3f7;
  --accent-2:  #7c6af5;
  --ok:        #43d9a0;
  --warn:      #f5c542;
  --danger:    #f56565;
  --font-head: 'DM Serif Display', serif;
  --font-body: 'Instrument Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --r:         8px;
  --r-lg:      14px;
  --shadow:    0 4px 24px rgba(0,0,0,.5);
}
html { font-size: 15px; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── TOPBAR ───────────────────────────────────────── */
.topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 0 28px;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.topbar-logo {
  font-family: var(--font-head);
  font-size: 1.15rem;
  color: var(--accent);
  letter-spacing: .5px;
  white-space: nowrap;
}
.topbar-logo span { color: var(--text); }
.topbar-sep { flex: 1; }
.badge-count {
  background: var(--accent-2);
  color: #fff;
  font-size: .68rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: .5px;
}

/* ── LAYOUT ───────────────────────────────────────── */
.layout {
  display: grid;
  grid-template-columns: 300px 1fr;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 56px);
}

/* ── SIDEBAR ──────────────────────────────────────── */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  overflow: hidden;
}
.search-wrap {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.search-icon {
  position: absolute; left: 28px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: .9rem; pointer-events: none;
}
#searchInput {
  width: 100%;
  padding: 9px 12px 9px 34px;
  background: var(--card);
  border: 1px solid var(--border-2);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font-body);
  font-size: .85rem;
  outline: none;
  transition: border-color .2s;
}
#searchInput:focus { border-color: var(--accent); }
#searchInput::placeholder { color: var(--muted); }

.cat-list { overflow-y: auto; flex: 1; padding: 8px 0; }
.cat-group { }
.cat-header {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 16px 4px;
  cursor: pointer;
  user-select: none;
}
.cat-header-icon { font-size: 1.05rem; }
.cat-header-label {
  font-size: .75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  flex: 1;
}
.cat-count {
  font-size: .7rem;
  font-family: var(--font-mono);
  color: var(--muted);
  background: var(--border);
  padding: 1px 6px;
  border-radius: 10px;
}
.cat-chevron {
  color: var(--muted);
  font-size: .7rem;
  transition: transform .2s;
}
.cat-group.open .cat-chevron { transform: rotate(90deg); }

.test-list { display: none; }
.cat-group.open .test-list { display: block; }

.test-item {
  padding: 8px 16px 8px 40px;
  cursor: pointer;
  font-size: .85rem;
  color: var(--muted);
  transition: all .15s;
  border-left: 2px solid transparent;
  position: relative;
}
.test-item:hover { background: var(--card); color: var(--text); }
.test-item.active {
  background: rgba(79,195,247,.08);
  color: var(--accent);
  border-left-color: var(--accent);
}
.test-item-id {
  font-family: var(--font-mono);
  font-size: .68rem;
  color: var(--border-2);
  display: block;
  margin-top: 1px;
}
.test-item.active .test-item-id { color: rgba(79,195,247,.4); }

/* ── MAIN PANEL ───────────────────────────────────── */
.main {
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}

/* Empty state */
.empty-state {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px;
  color: var(--muted);
  text-align: center;
  padding: 40px;
}
.empty-icon { font-size: 3rem; opacity: .4; }
.empty-title { font-family: var(--font-head); font-size: 1.4rem; color: var(--text); opacity: .5; }
.empty-sub { font-size: .85rem; max-width: 260px; line-height: 1.6; }

/* Form panel */
.form-panel {
  display: none;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}
.form-panel.visible { display: flex; }

.form-header {
  padding: 20px 28px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  display: flex; align-items: flex-start; gap: 14px;
}
.form-header-cat {
  width: 40px; height: 40px;
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}
.form-header-info { flex: 1; }
.form-header-name {
  font-family: var(--font-head);
  font-size: 1.35rem;
  line-height: 1.2;
  margin-bottom: 3px;
}
.form-header-meta {
  font-size: .75rem;
  color: var(--muted);
  font-family: var(--font-mono);
}
.form-header-actions { display: flex; gap: 8px; flex-shrink: 0; }
.btn {
  padding: 8px 18px;
  border-radius: var(--r);
  font-family: var(--font-body);
  font-size: .83rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all .15s;
  display: flex; align-items: center; gap: 6px;
}
.btn-ghost {
  background: var(--card);
  color: var(--muted);
  border: 1px solid var(--border-2);
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-primary {
  background: var(--accent);
  color: #0d0f14;
}
.btn-primary:hover { background: #81d4fa; }
.btn-success {
  background: var(--ok);
  color: #0d0f14;
}
.btn-success:hover { background: #6ee7c0; }

/* Patient info strip */
.patient-strip {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px;
  padding: 14px 28px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.p-field label {
  font-size: .68rem;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--muted);
  display: block;
  margin-bottom: 4px;
}
.p-field input, .p-field select {
  width: 100%;
  padding: 6px 10px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: .82rem;
  outline: none;
  transition: border-color .2s;
}
.p-field input:focus, .p-field select:focus { border-color: var(--accent); }
.p-field select option { background: var(--surface); }

/* Fields grid */
.fields-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px 28px;
}
.fields-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}
.field-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 12px 14px;
  transition: border-color .2s;
  position: relative;
}
.field-card:focus-within { border-color: var(--border-2); }
.field-card.full-width {
  grid-column: 1 / -1;
}
.field-label {
  font-size: .73rem;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 6px;
}
.field-unit {
  font-size: .65rem;
  color: var(--border-2);
  font-family: var(--font-mono);
  background: var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 400;
  text-transform: none;
  letter-spacing: 0;
}
.field-input {
  width: 100%;
  padding: 8px 10px;
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: .88rem;
  outline: none;
  transition: border-color .2s;
}
.field-input:focus { border-color: var(--accent); }
.field-input.flag-high { border-color: var(--danger); color: var(--danger); }
.field-input.flag-low  { border-color: var(--warn);   color: var(--warn); }
.field-input.flag-ok   { border-color: var(--ok);     }
textarea.field-input {
  resize: vertical;
  min-height: 72px;
  font-family: var(--font-body);
  font-size: .85rem;
}
select.field-input { appearance: none; cursor: pointer; }
.field-refrange {
  font-size: .68rem;
  color: var(--muted);
  margin-top: 4px;
  font-family: var(--font-mono);
}
.flag-badge {
  position: absolute; top: 10px; right: 12px;
  font-size: .62rem;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: .05em;
  display: none;
}
.flag-badge.high { background: rgba(245,101,101,.15); color: var(--danger); display: block; }
.flag-badge.low  { background: rgba(245,197,66,.15);  color: var(--warn);   display: block; }

/* Section divider */
.section-title {
  grid-column: 1 / -1;
  font-size: .7rem;
  text-transform: uppercase;
  letter-spacing: .12em;
  color: var(--accent-2);
  padding: 4px 0 2px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2px;
  font-weight: 600;
}

/* Conclusion section */
.conclusion-bar {
  padding: 14px 28px;
  background: var(--surface);
  border-top: 1px solid var(--border);
}
.conclusion-label {
  font-size: .72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--accent);
  margin-bottom: 6px;
}
.conclusion-bar textarea {
  width: 100%;
  height: 72px;
  padding: 10px 14px;
  background: var(--card);
  border: 1px solid var(--border-2);
  border-radius: var(--r);
  color: var(--text);
  font-family: var(--font-body);
  font-size: .87rem;
  outline: none;
  resize: none;
  transition: border-color .2s;
}
.conclusion-bar textarea:focus { border-color: var(--accent); }

/* ── MODAL ────────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  z-index: 200;
  display: none;
  align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border-2);
  border-radius: var(--r-lg);
  width: min(640px, 95vw);
  max-height: 80vh;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow);
  animation: modalIn .2s ease;
}
@keyframes modalIn {
  from { opacity:0; transform: translateY(20px) scale(.97); }
  to   { opacity:1; transform: none; }
}
.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.modal-title { font-family: var(--font-head); font-size: 1.2rem; flex: 1; }
.modal-close {
  background: var(--card); border: 1px solid var(--border-2);
  color: var(--muted); width: 32px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; transition: all .15s;
}
.modal-close:hover { color: var(--danger); border-color: var(--danger); }
.modal-body { overflow-y: auto; padding: 20px 24px; flex: 1; }
.report-row {
  display: flex; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: .85rem;
  align-items: baseline;
}
.report-row:last-child { border: none; }
.report-key { color: var(--muted); width: 170px; flex-shrink: 0; font-size: .78rem; }
.report-val { flex: 1; font-family: var(--font-mono); }
.report-unit { color: var(--muted); font-size: .75rem; margin-left: 4px; }
.report-ref { color: var(--border-2); font-size: .72rem; margin-left: 8px; font-family: var(--font-mono); }
.report-flag { font-size: .65rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 6px; }
.report-flag.high { background: rgba(245,101,101,.15); color: var(--danger); }
.report-flag.low  { background: rgba(245,197,66,.15); color: var(--warn); }
.report-flag.ok   { background: rgba(67,217,160,.1); color: var(--ok); }
.report-section-hdr {
  font-size: .7rem; text-transform: uppercase; letter-spacing: .1em;
  color: var(--accent-2); padding: 10px 0 4px; font-weight: 600;
}
.modal-footer {
  padding: 14px 24px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px;
}

/* ── SCROLLBAR ────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── TOAST ────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--ok); color: #0d0f14;
  padding: 10px 18px; border-radius: var(--r);
  font-size: .85rem; font-weight: 600;
  z-index: 999; transform: translateY(60px);
  transition: transform .3s;
  box-shadow: var(--shadow);
}
.toast.show { transform: translateY(0); }

/* ── RESPONSIVE ───────────────────────────────────── */
@media (max-width: 768px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { height: 220px; }
  .patient-strip { grid-template-columns: repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo">HMS <span>Lab Module</span></div>
  <div class="topbar-sep"></div>
  <div class="badge-count" id="totalCount">— tests</div>
</header>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR: Category + Test List -->
  <aside class="sidebar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search tests…" autocomplete="off"/>
    </div>
    <div class="cat-list" id="catList"></div>
  </aside>

  <!-- MAIN PANEL -->
  <main class="main">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🧪</div>
      <div class="empty-title">Select a Test</div>
      <div class="empty-sub">Choose any test from the sidebar to load its template and begin entering findings.</div>
    </div>

    <!-- Form panel -->
    <div class="form-panel" id="formPanel">

      <div class="form-header">
        <div class="form-header-cat" id="formCatIcon"></div>
        <div class="form-header-info">
          <div class="form-header-name" id="formTestName"></div>
          <div class="form-header-meta" id="formTestMeta"></div>
        </div>
        <div class="form-header-actions">
          <button class="btn btn-ghost" onclick="clearForm()">↺ Clear</button>
          <button class="btn btn-primary" onclick="previewReport()">👁 Preview</button>
          <button class="btn btn-success" onclick="saveReport()">✓ Save Report</button>
        </div>
      </div>

      <!-- Patient info -->
      <div class="patient-strip">
        <div class="p-field">
          <label>Patient ID / File No.</label>
          <input type="text" id="pid" placeholder="e.g. P-20240001"/>
        </div>
        <div class="p-field">
          <label>Full Name</label>
          <input type="text" id="pname" placeholder="Patient full name"/>
        </div>
        <div class="p-field">
          <label>Age / Sex</label>
          <input type="text" id="page" placeholder="e.g. 34 / M"/>
        </div>
        <div class="p-field">
          <label>Requesting Doctor</label>
          <input type="text" id="pdoctor" placeholder="Dr. …"/>
        </div>
      </div>

      <!-- Dynamic fields -->
      <div class="fields-scroll">
        <div class="fields-grid" id="fieldsGrid"></div>
      </div>

      <!-- Conclusion -->
      <div class="conclusion-bar">
        <div class="conclusion-label">Conclusion / Interpretation</div>
        <textarea id="conclusion" placeholder="Enter overall interpretation, clinical comments, or recommendations…"></textarea>
      </div>

    </div>
  </main>
</div>

<!-- PREVIEW MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Report Preview</div>
      <div class="modal-close" onclick="closeModal()">✕</div>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      <button class="btn btn-primary" onclick="printReport()">🖨 Print</button>
      <button class="btn btn-success" onclick="saveReport()">✓ Save</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ Report saved successfully</div>

<script>
// ─────────────────────────────────────────────────────
// Templates from /api/lab/bundle (lib/labTestTemplates.js)
// ─────────────────────────────────────────────────────
let LAB_TEST_TEMPLATES = {};
async function loadLabTemplates() {
  const r = await fetch('/api/lab/bundle', { credentials: 'same-origin' });
  if (!r.ok) throw new Error('Could not load lab templates (HTTP ' + r.status + ')');
  const j = await r.json();
  if (!j.success || !j.data) throw new Error(j.message || 'Invalid response');
  LAB_TEST_TEMPLATES = j.data;
}

const __qs = new URLSearchParams(location.search);
window.__LAB_ORDER = {
  serviceCode: (__qs.get('code') || '').trim(),
  opdOrderItemId: parseInt(__qs.get('oi') || '', 10) || 0
};

function ageFromDob(dob) {
  if (!dob) return '';
  try {
    const d = new Date(dob);
    if (isNaN(d.getTime())) return '';
    const t2 = new Date();
    let a = t2.getFullYear() - d.getFullYear();
    const mn = t2.getMonth() - d.getMonth();
    if (mn < 0 || (mn === 0 && t2.getDate() < d.getDate())) a--;
    return a + 'y';
  } catch (e) {
    return '';
  }
}

async function maybeLoadOrderContext() {
  const code = window.__LAB_ORDER.serviceCode;
  const oid = window.__LAB_ORDER.opdOrderItemId;
  if (!code || !oid) return;
  const r = await fetch(
    '/api/lab/order-context?code=' + encodeURIComponent(code) + '&oi=' + encodeURIComponent(String(oid)),
    { credentials: 'same-origin' }
  );
  const j = await r.json();
  if (!j.success) throw new Error(j.message || 'Could not load order context');
  const p = j.patient;
  document.getElementById('pid').value = p.id;
  document.getElementById('pname').value = [p.first_name, p.last_name].filter(Boolean).join(' ');
  const ag = ageFromDob(p.dob);
  document.getElementById('page').value = [ag, p.gender].filter(Boolean).join(' / ');
}

// ─────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────
let currentTest = null;
let formValues  = {};

// ─────────────────────────────────────────────────────
// SIDEBAR BUILDER
// ─────────────────────────────────────────────────────
function buildSidebar(filter = '') {
  const list = document.getElementById('catList');
  list.innerHTML = '';
  let totalTests = 0;

  for (const [catKey, cat] of Object.entries(LAB_TEST_TEMPLATES)) {
    const filtered = filter
      ? cat.tests.filter(t => t.name.toLowerCase().includes(filter) || t.id.toLowerCase().includes(filter) || cat.label.toLowerCase().includes(filter))
      : cat.tests;

    if (!filtered.length) continue;
    totalTests += filtered.length;

    const grp = document.createElement('div');
    grp.className = 'cat-group' + (filter || catKey === 'hematology' ? ' open' : '');
    grp.innerHTML = `
      <div class="cat-header" onclick="toggleCat(this.parentNode)">
        <span class="cat-header-icon">${cat.icon}</span>
        <span class="cat-header-label" style="color:${cat.color}">${cat.label}</span>
        <span class="cat-count">${filtered.length}</span>
        <span class="cat-chevron">▶</span>
      </div>
      <div class="test-list">
        ${filtered.map(t => `
          <div class="test-item ${currentTest?.id===t.id ? 'active' : ''}"
               onclick="loadTest('${catKey}','${t.id}')"
               data-id="${t.id}">
            ${t.name}
            <span class="test-item-id">${t.id}</span>
          </div>
        `).join('')}
      </div>`;
    list.appendChild(grp);
  }

  document.getElementById('totalCount').textContent =
    filter ? `${totalTests} result${totalTests!==1?'s':''}` : `${getAllCount()} tests`;
}

function getAllCount() {
  return Object.values(LAB_TEST_TEMPLATES).reduce((s,c) => s + c.tests.length, 0);
}

function toggleCat(grp) {
  grp.classList.toggle('open');
}

// ─────────────────────────────────────────────────────
// TEST LOADER
// ─────────────────────────────────────────────────────
function loadTest(catKey, testId) {
  const cat  = LAB_TEST_TEMPLATES[catKey];
  const test = cat.tests.find(t => t.id === testId);
  if (!test) return;

  currentTest = { ...test, catKey, catColor: cat.color, catIcon: cat.icon, catLabel: cat.label };
  formValues  = {};

  // Update header
  document.getElementById('formCatIcon').textContent = cat.icon;
  document.getElementById('formCatIcon').style.background = cat.color + '22';
  document.getElementById('formCatIcon').style.border = `1px solid ${cat.color}44`;
  document.getElementById('formTestName').textContent = test.name;
  document.getElementById('formTestMeta').textContent = `${cat.label}  ·  ID: ${test.id}  ·  ${test.fields.length} fields`;

  // Render fields
  renderFields(test.fields);

  // Clear conclusion
  document.getElementById('conclusion').value = '';

  // Toggle visibility
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('formPanel').classList.add('visible');

  // Highlight sidebar
  document.querySelectorAll('.test-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === testId);
  });
}

function renderFields(fields) {
  const grid = document.getElementById('fieldsGrid');
  grid.innerHTML = '';

  fields.forEach(field => {
    const card = document.createElement('div');
    card.className = 'field-card' + (field.type === 'textarea' ? ' full-width' : '');

    const labelHtml = `
      <div class="field-label">
        ${field.label}
        ${field.unit ? `<span class="field-unit">${field.unit}</span>` : ''}
      </div>`;

    let inputHtml = '';
    if (field.type === 'number') {
      inputHtml = `<input type="number" class="field-input" id="f_${field.key}"
        placeholder="—" step="any"
        oninput="onFieldChange('${field.key}', this)"/>
        <div class="field-refrange" id="ref_${field.key}">${field.refRange ? 'Ref: ' + field.refRange : ''}</div>
        <div class="flag-badge" id="flag_${field.key}"></div>`;
    } else if (field.type === 'textarea') {
      inputHtml = `<textarea class="field-input" id="f_${field.key}" rows="3"
        placeholder="—"
        oninput="onFieldChange('${field.key}', this)"></textarea>`;
    } else if (field.type === 'select') {
      inputHtml = `<select class="field-input" id="f_${field.key}"
        onchange="onFieldChange('${field.key}', this)">
        <option value="">— Select —</option>
        ${(field.options || []).map(o => `<option value="${o}">${o}</option>`).join('')}
      </select>`;
    } else {
      inputHtml = `<input type="text" class="field-input" id="f_${field.key}"
        placeholder="—"
        oninput="onFieldChange('${field.key}', this)"/>`;
    }

    card.innerHTML = labelHtml + inputHtml;
    grid.appendChild(card);
  });
}

function onFieldChange(key, el) {
  formValues[key] = el.value;

  // Flag numeric values
  if (!currentTest) return;
  const field = currentTest.fields.find(f => f.key === key);
  if (!field || field.type !== 'number') return;

  const val   = parseFloat(el.value);
  const badge = document.getElementById(`flag_${key}`);
  el.classList.remove('flag-high', 'flag-low', 'flag-ok');
  badge.classList.remove('high', 'low');
  badge.textContent = '';

  if (!isNaN(val) && field.normalMin !== undefined && field.normalMax !== undefined) {
    if (val < field.normalMin) {
      el.classList.add('flag-low');
      badge.classList.add('low');
      badge.textContent = '▼ LOW';
    } else if (val > field.normalMax) {
      el.classList.add('flag-high');
      badge.classList.add('high');
      badge.textContent = '▲ HIGH';
    } else {
      el.classList.add('flag-ok');
    }
  }
}

// ─────────────────────────────────────────────────────
// REPORT PREVIEW
// ─────────────────────────────────────────────────────
function previewReport() {
  if (!currentTest) return;

  const pid      = document.getElementById('pid').value;
  const pname    = document.getElementById('pname').value;
  const page     = document.getElementById('page').value;
  const pdoctor  = document.getElementById('pdoctor').value;
  const conc     = document.getElementById('conclusion').value;

  // Collect live values from DOM
  currentTest.fields.forEach(f => {
    const el = document.getElementById(`f_${f.key}`);
    if (el) formValues[f.key] = el.value;
  });

  let bodyHtml = `
    <div class="report-section-hdr">Patient Information</div>
    <div class="report-row"><span class="report-key">Patient ID</span><span class="report-val">${pid||'—'}</span></div>
    <div class="report-row"><span class="report-key">Patient Name</span><span class="report-val">${pname||'—'}</span></div>
    <div class="report-row"><span class="report-key">Age / Sex</span><span class="report-val">${page||'—'}</span></div>
    <div class="report-row"><span class="report-key">Requesting Doctor</span><span class="report-val">${pdoctor||'—'}</span></div>
    <div class="report-row"><span class="report-key">Date</span><span class="report-val">${new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})}</span></div>
    <div class="report-section-hdr" style="margin-top:12px">Results</div>`;

  currentTest.fields.forEach(f => {
    const val = formValues[f.key] || '';
    if (!val) return;

    let flagHtml = '';
    if (f.type === 'number' && val !== '') {
      const num = parseFloat(val);
      if (!isNaN(num) && f.normalMin !== undefined && f.normalMax !== undefined) {
        if (num < f.normalMin) flagHtml = `<span class="report-flag low">▼ LOW</span>`;
        else if (num > f.normalMax) flagHtml = `<span class="report-flag high">▲ HIGH</span>`;
        else flagHtml = `<span class="report-flag ok">✓</span>`;
      }
    }

    bodyHtml += `
      <div class="report-row">
        <span class="report-key">${f.label}</span>
        <span class="report-val">
          ${val}${flagHtml}
          ${f.unit ? `<span class="report-unit">${f.unit}</span>` : ''}
          ${f.refRange ? `<span class="report-ref">  [${f.refRange}]</span>` : ''}
        </span>
      </div>`;
  });

  if (conc) {
    bodyHtml += `
      <div class="report-section-hdr" style="margin-top:12px">Conclusion</div>
      <div style="font-size:.87rem; line-height:1.7; padding:8px 0; color:var(--text)">${conc}</div>`;
  }

  document.getElementById('modalTitle').textContent = currentTest.name + ' – Report Preview';
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveReport() {
  closeModal();
  // Collect final values
  if (currentTest) {
    currentTest.fields.forEach(f => {
      const el = document.getElementById(`f_${f.key}`);
      if (el) formValues[f.key] = el.value;
    });
  }
  const report = {
    reportId: 'RPT-' + Date.now(),
    testId: currentTest?.id,
    testName: currentTest?.name,
    patientInfo: {
      id: document.getElementById('pid').value,
      name: document.getElementById('pname').value,
      ageSex: document.getElementById('page').value,
      doctor: document.getElementById('pdoctor').value
    },
    values: { ...formValues },
    conclusion: document.getElementById('conclusion').value,
    savedAt: new Date().toISOString()
  };
  const persistBody = {
    patientInfo: report.patientInfo,
    testId: report.testId,
    values: report.values,
    conclusion: report.conclusion
  };
  if (window.__LAB_ORDER.serviceCode && window.__LAB_ORDER.opdOrderItemId) {
    persistBody.serviceCode = window.__LAB_ORDER.serviceCode;
    persistBody.opdOrderItemId = window.__LAB_ORDER.opdOrderItemId;
  }
  fetch('/api/lab/report/persist', {
    method: 'POST',
    credentials: 'same-origin',
    headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
    body: JSON.stringify(persistBody)
  })
    .then((r) => r.json())
    .then((j) => {
      if (!j.success) throw new Error(j.message || 'Save failed');
      console.log('REPORT SAVED:', j.data && j.data.report);
      showToast('✓ Saved to lab registry #' + ((j.data && j.data.labResultId) || ''));
    })
    .catch((e) => {
      console.error(e);
      showToast('Save failed: ' + (e.message || String(e)));
    });
}

function clearForm() {
  if (!currentTest) return;
  currentTest.fields.forEach(f => {
    const el = document.getElementById(`f_${f.key}`);
    if (!el) return;
    el.value = '';
    el.classList.remove('flag-high','flag-low','flag-ok');
    const badge = document.getElementById(`flag_${f.key}`);
    if (badge) { badge.textContent=''; badge.classList.remove('high','low'); }
  });
  document.getElementById('conclusion').value = '';
  formValues = {};
}

function printReport() {
  window.print();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ─────────────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  buildSidebar(this.value.toLowerCase().trim());
});

// ─────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────
loadLabTemplates()
  .then(() => {
    return maybeLoadOrderContext().catch((e) => {
      console.warn('order context', e);
      if (window.__LAB_ORDER && window.__LAB_ORDER.serviceCode) {
        showToast('Order context: ' + (e.message || String(e)));
      }
    });
  })
  .then(() => {
    buildSidebar();
    document.getElementById('totalCount').textContent = getAllCount() + ' tests';
  })
  .catch((err) => {
    const list = document.getElementById('catList');
    if (list) {
      list.innerHTML =
        '<p style="padding:12px;color:#ef4444;font-size:13px;">' +
        (err && err.message ? err.message : String(err)) +
        '</p>';
    }
    document.getElementById('totalCount').textContent = '0 tests';
  });

// Close modal on overlay click
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
